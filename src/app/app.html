<mat-drawer-container class="app-container">
  <mat-drawer #drawer mode="over" class="file-drawer">
    <app-presentation-list-drawer></app-presentation-list-drawer>
  </mat-drawer>

  <mat-drawer-content class="app-content">
    <mat-toolbar class="toolbar" role="banner">
      <button mat-icon-button (click)="drawer.toggle()" aria-label="Open presentation list">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar__brand">Folio</span>

      <div class="toolbar__title-container">
        @if (isEditingTitle()) {
          <input 
            #titleInput
            type="text" 
            class="toolbar__title-input"
            [value]="editValue()"
            (input)="editValue.set(titleInput.value)"
            (blur)="finishRename()"
            (keydown)="onTitleKeydown($event)"
            aria-label="Rename presentation"
          >
        } @else {
          <button 
            mat-button 
            class="toolbar__file-chip" 
            (click)="onTitleClick()" 
            aria-label="Rename presentation"
            matTooltip="Rename presentation"
          >
            {{ store.currentFile()?.replace('.md', '') || 'New Presentation' }}
          </button>
        }
      </div>

      @if (store.isDirty()) {
        <div class="toolbar__dirty-indicator" matTooltip="Unsaved changes"></div>
      }

      <span class="toolbar__spacer"></span>

      <button
        mat-icon-button
        [attr.aria-label]="colorSchemeLabel()"
        [matTooltip]="colorSchemeLabel()"
        (click)="store.cycleColorScheme()"
      >
        <mat-icon>{{ colorSchemeIcon() }}</mat-icon>
      </button>
      <button mat-icon-button aria-label="Open settings">
        <mat-icon>settings</mat-icon>
      </button>
    </mat-toolbar>

    @if (isWide()) {
      <div #splitPane class="split-pane" role="main" 
        [class.is-dragging]="isDragging()"
        [style.grid-template-columns]="store.editorWidth() + 'px 1px 1fr'">
        <app-editor-pane class="split-pane__editor" />
        <div
          class="split-pane__divider"
          role="separator"
          aria-orientation="vertical"
          cdkDrag
          cdkDragLockAxis="x"
          (cdkDragStarted)="onDragStart()"
          (cdkDragEnded)="onDragEnd()"
          (cdkDragMoved)="onResize($event)"
        ></div>
        <app-preview-pane class="split-pane__preview" />
      </div>
    } @else {
      <mat-tab-group class="tab-group" animationDuration="200ms" role="main"
        aria-label="Editor and Preview tabs">
        <mat-tab label="Edit">
          <app-editor-pane />
        </mat-tab>
        <mat-tab label="Preview">
          <app-preview-pane />
        </mat-tab>
      </mat-tab-group>
    }
  </mat-drawer-content>
</mat-drawer-container>
